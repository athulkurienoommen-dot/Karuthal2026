<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karuthal 2026 - Interactive Calculator</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #3b82f6;
            --accent-color: #10b981;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #334155;
            --slider-track: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calc-wrapper {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 900px;
            padding: 35px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            color: var(--primary-color);
            margin: 0 0 4px 0;
            font-size: 1.8rem;
            font-weight: 700;
        }

        header p {
            color: #64748b;
            margin: 0;
            font-size: 0.95rem;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
        }

        @media (min-width: 768px) {
            .layout-grid {
                grid-template-columns: 1.2fr 0.8fr;
            }
        }

        /* Segmented Control / Pills styling */
        .segmented-control {
            display: inline-flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 99px;
            margin-bottom: 25px;
            width: 100%;
            box-sizing: border-box;
        }

        .segment-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 10px;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .segment-btn.active {
            background: #ffffff;
            color: var(--primary-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        /* Form Controls and Sliders */
        .control-group {
            margin-bottom: 30px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .control-label {
            font-weight: 500;
            color: #475569;
            font-size: 0.95rem;
        }

        .badge-value {
            background-color: #ecfdf5;
            color: var(--accent-color);
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 1rem;
            min-width: 60px;
            text-align: center;
        }

        /* Modern Range Sliders */
        .modern-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 99px;
            background: var(--slider-track);
            outline: none;
            margin: 15px 0;
        }

        .modern-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid var(--accent-color);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            transition: transform 0.1s ease;
        }

        .modern-slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        /* Output Card Side */
        .summary-side {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: #fdfdfd;
            border: 1px solid #f1f5f9;
            border-radius: 16px;
            padding: 25px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 0.95rem;
            color: #64748b;
        }

        .summary-row span.val {
            color: #1e293b;
            font-weight: 600;
        }

        .total-box {
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
            margin-top: 10px;
        }

        .total-box h4 {
            margin: 0 0 4px 0;
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .total-price {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        /* UPI CTA Button */
        .pay-btn {
            display: block;
            background-color: var(--accent-color);
            color: white;
            text-align: center;
            font-weight: 700;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            transition: all 0.2s ease;
        }

        .pay-btn:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .desktop-note {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 12px;
            text-align: center;
            line-height: 1.3;
        }
    </style>
</head>
<body>

<div class="calc-wrapper">
    <header>
        <h1>Karuthal 2026</h1>
        <p>Holy Trinity Chapel, Ulloor — Youth Movement</p>
    </header>

    <div class="layout-grid">
        <div>
            <div class="segmented-control">
                <button class="segment-btn active" id="btn-tuition" onclick="setType('tuition')">Tuition Fee</button>
                <button class="segment-btn" id="btn-book" onclick="setType('book')">Book Charge</button>
            </div>

            <div class="segmented-control">
                <button class="segment-btn active" id="freq-yearly" onclick="setFrequency('yearly')">Yearly</button>
                <button class="segment-btn" id="freq-term" onclick="setFrequency('term')">Termly</button>
                <button class="segment-btn" id="freq-month" onclick="setFrequency('month')">Monthly</button>
                <button class="segment-btn" id="freq-day" onclick="setFrequency('day')">Daily</button>
            </div>

            <div class="control-group">
                <div class="label-row">
                    <span class="control-label">Target Class Standard</span>
                    <span class="badge-value" id="classBadge">LKG</span>
                </div>
                <input type="range" id="classSlider" min="0" max="13" value="0" class="modern-slider" oninput="updateCalculation()">
            </div>

            <div class="control-group">
                <div class="label-row">
                    <span class="control-label">Number of Students</span>
                    <span class="badge-value" id="studentBadge">1</span>
                </div>
                <input type="range" id="studentSlider" min="1" max="10" value="1" class="modern-slider" oninput="updateCalculation()">
            </div>

            <div class="control-group" id="durationUiGroup" style="display: none;">
                <div class="label-row">
                    <span class="control-label" id="durationTitle">Duration</span>
                    <span class="badge-value" id="durationBadge">1</span>
                </div>
                <input type="range" id="durationSlider" min="1" max="12" value="1" class="modern-slider" oninput="updateCalculation()">
            </div>
        </div>

        <div class="summary-side">
            <div>
                <div class="summary-row">
                    <span>Support Type:</span>
                    <span class="val" id="sumType">Tuition Fee</span>
                </div>
                <div class="summary-row">
                    <span>Class Range:</span>
                    <span class="val" id="sumClass">LKG</span>
                </div>
                <div class="summary-row">
                    <span>Student Matrix:</span>
                    <span class="val" id="sumStudents">1 Student</span>
                </div>
                <div class="summary-row" id="sumDurationRow" style="display:none;">
                    <span>Timeline:</span>
                    <span class="val" id="sumDuration">1 Month</span>
                </div>
            </div>

            <div class="total-box">
                <h4>Total Donation Value</h4>
                <div class="total-price">₹<span id="grandTotal">0</span></div>
                
                <a href="#" id="actionPayBtn" class="pay-btn">📱 Pay via UPI</a>
                <div class="desktop-note" id="desktopRemHelper">
                    For system transfers, use UPI ID: <b>yourchurchupi@bank</b><br>
                    <span id="txtUpiRemark" style="color:var(--secondary-color); font-weight:600;"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // System Configurations Mapping
    const CHURCH_UPI_ID = "yourchurchupi@bank"; 
    const CHURCH_NAME = "Holy Trinity Chapel Ulloor";

    const classesOrder = ["LKG", "UKG", "1st", "2nd", "3rd", "4th", "5th", "6th", "7th", "8th", "9th", "10th", "11th", "12th"];
    
    const feeData = {
        tuition: {
            "LKG": { yearly: 18700, term: 6233, month: 1558, day: 52 },
            "UKG": { yearly: 18700, term: 6233, month: 1558, day: 52 },
            "1st": { yearly: 20400, term: 6800, month: 1700, day: 57 },
            "2nd": { yearly: 21000, term: 7000, month: 1750, day: 58 },
            "3rd": { yearly: 21600, term: 7200, month: 1800, day: 60 },
            "4th": { yearly: 22200, term: 7400, month: 1850, day: 62 },
            "5th": { yearly: 22800, term: 7600, month: 1900, day: 63 },
            "6th": { yearly: 23400, term: 7800, month: 1950, day: 65 },
            "7th": { yearly: 24000, term: 8000, month: 2000, day: 67 },
            "8th": { yearly: 24600, term: 8200, month: 2050, day: 68 },
            "9th": { yearly: 25200, term: 8400, month: 2100, day: 70 },
            "10th": { yearly: 25800, term: 8600, month: 2150, day: 72 },
            "11th": { yearly: 35000, term: 11667, month: 2917, day: 97 },
            "12th": { yearly: 36300, term: 12100, month: 3025, day: 101 }
        },
        book: {
            "LKG": { yearly: 2800, term: 933, month: 233, day: 8 },
            "UKG": { yearly: 2800, term: 933, month: 233, day: 8 },
            "1st": { yearly: 2650, term: 883, month: 221, day: 7 },
            "2nd": { yearly: 2650, term: 883, month: 221, day: 7 },
            "3rd": { yearly: 2900, term: 967, month: 242, day: 8 },
            "4th": { yearly: 2950, term: 983, month: 246, day: 8 },
            "5th": { yearly: 2850, term: 950, month: 238, day: 8 },
            "6th": { yearly: 2350, term: 783, month: 196, day: 7 },
            "7th": { yearly: 2350, term: 783, month: 196, day: 7 },
            "8th": { yearly: 1950, term: 650, month: 163, day: 5 },
            "9th": { yearly: 1550, term: 517, month: 129, day: 4 },
            "10th": { yearly: 1450, term: 483, month: 121, day: 4 },
            "11th": { yearly: 1750, term: 583, month: 146, day: 5 },
            "12th": { yearly: 2350, term: 783, month: 196, day: 7 }
        }
    };

    // Global Interactive State Management
    let currentType = 'tuition';
    let currentFrequency = 'yearly';

    window.onload = function() {
        // Adjust display mode for UPI action buttons based on architecture type
        if(!/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)){
            document.getElementById('actionPayBtn').style.display = 'none';
        }
        updateCalculation();
    };

    function setType(type) {
        currentType = type;
        document.getElementById('btn-tuition').classList.toggle('active', type === 'tuition');
        document.getElementById('btn-book').classList.toggle('active', type === 'book');
        document.getElementById('sumType').textContent = type === 'tuition' ? 'Tuition Fee' : 'Book Charge';
        updateCalculation();
    }

    function setFrequency(freq) {
        currentFrequency = freq;
        const frequencies = ['yearly', 'term', 'month', 'day'];
        frequencies.forEach(f => {
            document.getElementById(`freq-${f}`).classList.toggle('active', f === freq);
        });

        const dGroup = document.getElementById('durationUiGroup');
        const dSlider = document.getElementById('durationSlider');
        const dTitle = document.getElementById('durationTitle');

        if (freq === 'yearly') {
            dGroup.style.display = 'none';
            document.getElementById('sumDurationRow').style.display = 'none';
        } else {
            dGroup.style.display = 'block';
            document.getElementById('sumDurationRow').style.display = 'flex';
            if (freq === 'term') {
                dTitle.textContent = "Number of Terms";
                dSlider.max = 3;
                if (dSlider.value > 3) dSlider.value = 3;
            } else if (freq === 'month') {
                dTitle.textContent = "Number of Months";
                dSlider.max = 12;
            } else if (freq === 'day') {
                dTitle.textContent = "Number of Days";
                dSlider.max = 30;
            }
        }
        updateCalculation();
    }

    function updateCalculation() {
        // Collect indices values from raw sliders
        const classIndex = document.getElementById('classSlider').value;
        const selectedClass = classesOrder[classIndex];
        const studentCount = document.getElementById('studentSlider').value;
        const durationValue = document.getElementById('durationSlider').value;

        // Sync visual badges
        document.getElementById('classBadge').textContent = selectedClass;
        document.getElementById('studentBadge').textContent = studentCount;
        
        let displayDurationText = "";
        if (currentFrequency === 'term') displayDurationText = `${durationValue} Term${durationValue > 1 ? 's' : ''}`;
        if (currentFrequency === 'month') displayDurationText = `${durationValue} Month${durationValue > 1 ? 's' : ''}`;
        if (currentFrequency === 'day') displayDurationText = `${durationValue} Day${durationValue > 1 ? 's' : ''}`;
        document.getElementById('durationBadge').textContent = durationValue;

        // Text summary data sync
        document.getElementById('sumClass').textContent = `Class ${selectedClass}`;
        document.getElementById('sumStudents').textContent = `${studentCount} Student${studentCount > 1 ? 's' : ''}`;
        document.getElementById('sumDuration').textContent = displayDurationText;

        // Computation Execution
        const classRates = feeData[currentType][selectedClass];
        let unitRate = classRates[currentFrequency];
        let durationFactor = currentFrequency === 'yearly' ? 1 : parseInt(durationValue);
        
        const totalAmount = unitRate * parseInt(studentCount) * durationFactor;
        document.getElementById('grandTotal').textContent = totalAmount.toLocaleString('en-IN');

        // Audit Trail Tracking Reference Label Creation
        const typeLabel = currentType === 'tuition' ? 'Tuition' : 'Book';
        const remarkString = `Karuthal-${typeLabel}-Std${selectedClass}-${studentCount}Kids-${durationFactor}${currentFrequency.substring(0,3)}`;
        document.getElementById('txtUpiRemark').textContent = `Remark: ${remarkString}`;

        // Re-inject intent deep URL parameters
        const upiUrl = `upi://pay?pa=${encodeURIComponent(CHURCH_UPI_ID)}&pn=${encodeURIComponent(CHURCH_NAME)}&am=${totalAmount}&tn=${encodeURIComponent(remarkString)}&cu=INR`;
        document.getElementById('actionPayBtn').href = upiUrl;
    }
</script>

</body>
</html>
